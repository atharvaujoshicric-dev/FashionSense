<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>StyleAI — Profile</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/app.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="back-link">← </a>
      <span class="topbar-title">Profile</span>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="saveProfile()">✓</button>
    </div>
  </header>

  <div class="profile-hero">
    <div class="avatar-circle" id="avatar-circle"></div>
    <h2 id="profile-name-display"></h2>
    <p id="profile-username-display" class="profile-username"></p>
  </div>

  <div class="profile-form">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="p-name" />
    </div>
    <div class="form-group">
      <label>City</label>
      <select id="p-city"></select>
    </div>
    <div class="form-group">
      <label>Gender</label>
      <div class="pill-group" id="p-gender-group">
        <button class="pill" data-val="male" onclick="selectPill('p-gender-group', this)">Male</button>
        <button class="pill" data-val="female" onclick="selectPill('p-gender-group', this)">Female</button>
        <button class="pill" data-val="nonbinary" onclick="selectPill('p-gender-group', this)">Non-binary</button>
      </div>
    </div>
    <div class="form-group">
      <label>Body Type</label>
      <div class="pill-group" id="p-bodytype-group">
        <button class="pill" data-val="slim" onclick="selectPill('p-bodytype-group', this)">Slim</button>
        <button class="pill" data-val="athletic" onclick="selectPill('p-bodytype-group', this)">Athletic</button>
        <button class="pill" data-val="average" onclick="selectPill('p-bodytype-group', this)">Average</button>
        <button class="pill" data-val="broad" onclick="selectPill('p-bodytype-group', this)">Broad</button>
        <button class="pill" data-val="plus" onclick="selectPill('p-bodytype-group', this)">Plus</button>
      </div>
    </div>
    <div class="form-group">
      <label>Face Shape</label>
      <div class="pill-group" id="p-faceshape-group">
        <button class="pill" data-val="oval" onclick="selectPill('p-faceshape-group', this)">Oval</button>
        <button class="pill" data-val="round" onclick="selectPill('p-faceshape-group', this)">Round</button>
        <button class="pill" data-val="square" onclick="selectPill('p-faceshape-group', this)">Square</button>
        <button class="pill" data-val="heart" onclick="selectPill('p-faceshape-group', this)">Heart</button>
        <button class="pill" data-val="oblong" onclick="selectPill('p-faceshape-group', this)">Oblong</button>
      </div>
    </div>

    <div class="danger-zone">
      <h4>Account</h4>
      <button class="btn-danger full" onclick="logout()">Sign Out</button>
      <button class="btn-danger-outline full" onclick="deleteAccount()">Delete Account</button>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
