<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>StyleAI — Profile</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/app.css" />
  <link rel="stylesheet" href="../css/tryon.css" />
  <link rel="stylesheet" href="../css/features.css" />
  <link rel="stylesheet" href="../css/avatar.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="back-link">←</a>
      <span class="topbar-title">My Profile</span>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="saveProfile()">✓</button>
    </div>
  </header>

  <!-- ── Profile photo + avatar preview ── -->
  <div class="profile-photo-section">
    <!-- Tappable profile photo ring -->
    <div class="profile-photo-ring" onclick="changeProfilePhoto()" title="Tap to change photo">
      <img id="profile-photo-display" class="hidden" alt="Profile photo" />
      <span id="profile-photo-initials-lg" class="profile-photo-initials-lg"></span>
      <div class="profile-photo-edit-badge">✎</div>
    </div>
    <div>
      <h2 id="profile-name-display" style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;text-align:center"></h2>
      <p id="profile-username-display" style="font-size:0.82rem;color:var(--text-secondary);text-align:center"></p>
    </div>

    <!-- Animated avatar preview -->
    <div style="text-align:center">
      <p style="font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.5rem">Your Avatar</p>
      <div class="profile-avatar-mini-stage" id="profile-avatar-stage">
        <div class="avatar-loading"><div class="avatar-loading-fig">🧍</div></div>
      </div>
      <p style="font-size:0.68rem;color:var(--text-muted);margin-top:0.4rem">Built from your photo</p>
    </div>
  </div>

  <!-- Full-body photo -->
  <div class="section-block">
    <div class="section-header">
      <h3>Full-Body Photo</h3>
      <span class="trending-pill">For Try-On</span>
    </div>
    <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:0.85rem;line-height:1.5">
      Used for virtual outfit try-on. Stored only on your device.
    </p>
    <div class="body-photo-upload" id="profile-body-photo-area"
         onclick="openProfileBodyPhotoPicker()">
      <img id="profile-body-photo-img" class="hidden" alt="Full body photo" />
      <div class="body-photo-placeholder" id="profile-body-photo-placeholder">
        <span>🧍</span>
        <p>Tap — Camera · Gallery · Files</p>
        <small>Stand straight, head to toe</small>
      </div>
    </div>
    <p id="body-photo-status" class="body-photo-status hidden">✦ Tap ✓ to save</p>
  </div>

    <!-- Avatar builder CTA -->
  <div style="padding:0 1rem 0.5rem;text-align:center">
    <a href="avatar-builder.html" class="btn-secondary" style="display:inline-flex;align-items:center;gap:0.5rem;text-decoration:none;padding:0.75rem 1.5rem">
      🧑‍🎨 Customise My Avatar
    </a>
  </div>

  <div class="profile-form">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="p-name" autocomplete="name" />
    </div>
    <div class="form-group">
      <label>City</label>
      <select id="p-city"></select>
    </div>
    <div class="form-group">
      <label>Gender</label>
      <div class="pill-group" id="p-gender-group">
        <button type="button" class="pill" data-val="male"      onclick="selectPill('p-gender-group',this)">Male</button>
        <button type="button" class="pill" data-val="female"    onclick="selectPill('p-gender-group',this)">Female</button>
        <button type="button" class="pill" data-val="nonbinary" onclick="selectPill('p-gender-group',this)">Non-binary</button>
      </div>
    </div>
    <div class="form-group">
      <label>Body Type</label>
      <div class="pill-group" id="p-bodytype-group">
        <button type="button" class="pill" data-val="slim"     onclick="selectPill('p-bodytype-group',this)">Slim</button>
        <button type="button" class="pill" data-val="athletic" onclick="selectPill('p-bodytype-group',this)">Athletic</button>
        <button type="button" class="pill" data-val="average"  onclick="selectPill('p-bodytype-group',this)">Average</button>
        <button type="button" class="pill" data-val="broad"    onclick="selectPill('p-bodytype-group',this)">Broad</button>
        <button type="button" class="pill" data-val="plus"     onclick="selectPill('p-bodytype-group',this)">Plus</button>
      </div>
    </div>
    <div class="form-group">
      <label>Face Shape</label>
      <div class="pill-group" id="p-faceshape-group">
        <button type="button" class="pill" data-val="oval"   onclick="selectPill('p-faceshape-group',this)">Oval</button>
        <button type="button" class="pill" data-val="round"  onclick="selectPill('p-faceshape-group',this)">Round</button>
        <button type="button" class="pill" data-val="square" onclick="selectPill('p-faceshape-group',this)">Square</button>
        <button type="button" class="pill" data-val="heart"  onclick="selectPill('p-faceshape-group',this)">Heart</button>
        <button type="button" class="pill" data-val="oblong" onclick="selectPill('p-faceshape-group',this)">Oblong</button>
      </div>
    </div>

    <div class="stats-box" id="stats-box" style="display:none"></div>

    <div class="danger-zone">
      <h4>Account</h4>
      <button type="button" class="btn-danger full"         onclick="logout()">Sign Out</button>
      <button type="button" class="btn-danger-outline full" onclick="deleteAccount()">Delete Account</button>
    </div>
  </div>
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item ">🏠<span>Home</span></a>
    <a href="wardrobe.html"  class="nav-item ">👕<span>Wardrobe</span></a>
    <a href="outfit.html"    class="nav-item ">✨<span>Outfit</span></a>
    <a href="analysis.html"  class="nav-item ">📊<span>Insights</span></a>
    <a href="more.html"      class="nav-item active">⋯<span>More</span></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script type="module" src="../js/cloud-sync.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/photo-picker.js"></script>
  <script src="../js/avatar.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
