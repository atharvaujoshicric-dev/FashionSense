<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>StyleAI — Outfit Calendar</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/app.css" />
  <link rel="stylesheet" href="../css/features.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/avatar.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="back-link">←</a>
      <span class="topbar-title">Outfit Calendar</span>
    </div>
    <div class="topbar-right">
      <div id="cal-streak" class="streak-badge">
      <a href="profile.html" class="topbar-avatar-link"><div class="topbar-avatar avatar-circle"></div></a>
    </div>
    </div>
  </header>

  <!-- Month nav -->
  <div class="cal-month-nav">
    <button class="cal-nav-btn" onclick="calPrevMonth()">‹</button>
    <span id="cal-month-label" class="cal-month-label"></span>
    <button class="cal-nav-btn" onclick="calNextMonth()">›</button>
  </div>

  <!-- Calendar grid -->
  <div class="cal-grid" id="cal-grid"></div>

  <!-- Recent history -->
  <div class="section-block">
    <div class="section-header"><h3>Recent Looks</h3></div>
    <div id="cal-history-list"></div>
  </div>

  <!-- Day modal -->
  <div class="modal-overlay hidden" id="cal-day-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3 class="modal-title" id="cal-modal-date"></h3>
      <div id="cal-modal-body"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">🏠<span>Home</span></a>
    <a href="wardrobe.html"  class="nav-item">👕<span>Wardrobe</span></a>
    <a href="outfit.html"    class="nav-item">✨<span>Outfit</span></a>
    <a href="analysis.html"  class="nav-item">📊<span>Insights</span></a>
    <a href="more.html"      class="nav-item">⋯<span>More</span></a>
  </nav>

  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/calendar.js"></script>
  <script src="../js/avatar.js"></script>
</body>
</html>
