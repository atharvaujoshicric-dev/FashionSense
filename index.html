<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>StyleAI — Your Personal Fashion Designer</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

  <!-- SPLASH / ONBOARDING -->
  <div id="splash-screen" class="screen active">
    <div class="splash-bg"></div>
    <div class="splash-content">
      <div class="logo-wrap">
        <span class="logo-icon">✦</span>
        <h1 class="logo-text">StyleAI</h1>
        <p class="logo-sub">Your world-class fashion designer</p>
      </div>
      <div class="splash-actions">
        <button class="btn-primary" onclick="showScreen('login-screen')">Sign In</button>
        <button class="btn-ghost" onclick="showScreen('register-screen')">Create Account</button>
      </div>
      <p class="splash-note">Trending as of June 2026 · No subscriptions · No ads</p>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="login-screen" class="screen">
    <div class="auth-container">
      <button class="back-btn" onclick="showScreen('splash-screen')">← Back</button>
      <div class="auth-header">
        <span class="logo-icon small">✦</span>
        <h2>Welcome back</h2>
        <p>Sign in to your style profile</p>
      </div>
      <div class="auth-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="your username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button class="btn-primary full" onclick="handleLogin()">Sign In</button>
        <p class="auth-switch">No account? <a onclick="showScreen('register-screen')">Create one</a></p>
      </div>
    </div>
  </div>

  <!-- REGISTER -->
  <div id="register-screen" class="screen">
    <div class="auth-container scrollable">
      <button class="back-btn" onclick="showScreen('splash-screen')">← Back</button>
      <div class="auth-header">
        <span class="logo-icon small">✦</span>
        <h2>Create Profile</h2>
        <p>Let's set up your style identity</p>
      </div>
      <div class="auth-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="choose a username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label>Gender</label>
          <div class="pill-group" id="gender-group">
            <button class="pill" data-val="male" onclick="selectPill('gender-group', this)">Male</button>
            <button class="pill" data-val="female" onclick="selectPill('gender-group', this)">Female</button>
            <button class="pill" data-val="nonbinary" onclick="selectPill('gender-group', this)">Non-binary</button>
          </div>
        </div>
        <div class="form-group">
          <label>City</label>
          <select id="reg-city">
            <option value="">Select city...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Body Type</label>
          <div class="pill-group" id="bodytype-group">
            <button class="pill" data-val="slim" onclick="selectPill('bodytype-group', this)">Slim</button>
            <button class="pill" data-val="athletic" onclick="selectPill('bodytype-group', this)">Athletic</button>
            <button class="pill" data-val="average" onclick="selectPill('bodytype-group', this)">Average</button>
            <button class="pill" data-val="broad" onclick="selectPill('bodytype-group', this)">Broad</button>
            <button class="pill" data-val="plus" onclick="selectPill('bodytype-group', this)">Plus</button>
          </div>
        </div>
        <div class="form-group">
          <label>Face Shape</label>
          <div class="pill-group" id="faceshape-group">
            <button class="pill" data-val="oval" onclick="selectPill('faceshape-group', this)">Oval</button>
            <button class="pill" data-val="round" onclick="selectPill('faceshape-group', this)">Round</button>
            <button class="pill" data-val="square" onclick="selectPill('faceshape-group', this)">Square</button>
            <button class="pill" data-val="heart" onclick="selectPill('faceshape-group', this)">Heart</button>
            <button class="pill" data-val="oblong" onclick="selectPill('faceshape-group', this)">Oblong</button>
          </div>
        </div>
        <div id="reg-error" class="form-error hidden"></div>
        <button class="btn-primary full" onclick="handleRegister()">Create Account</button>
        <p class="auth-switch">Already have one? <a onclick="showScreen('login-screen')">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
